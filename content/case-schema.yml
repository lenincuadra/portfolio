# ══════════════════════════════════════════════════════
# CASE STUDY SCHEMA — populates cases/case-v2.html template
# ══════════════════════════════════════════════════════
# Llena este archivo con el contenido del caso.
# Cada campo tiene versión EN (inglés) y ES (español latino neutro).
# Aplica los valores al HTML manualmente siguiendo CASES.md.
#
# TIPOS DE BLOQUE disponibles dentro de content[]:
#   type: subheading   → <h3>  requiere: text { en, es }
#   type: body         → <p>   requiere: text { en, es }
#   type: steps        → lista requiere: variant (bullet|numbered), items[]
#                               opcional: columns (1|2)
#   type: image        → img   requiere: src, alt
#                               opcional: loading (lazy|eager)
#   type: gallery      → grid 2 imágenes  requiere: images[{ src, alt }]
#
# LAYOUTS de sección:
#   (ninguno)          → stack vertical estándar
#   layout: overview   → steps a la izquierda, imagen a la derecha
# ══════════════════════════════════════════════════════

meta:
  page_title: "Case — E-commerce | Lenin Cuadra"
  images_folder: "ecommerce"        # carpeta dentro de assets/images/

tags:
  - en: "E-commerce"
    es: "E-commerce"
  - en: "Conversion Optimization"
    es: "Optimización de conversión"
  - "Montironi Automotive"          # string simple = igual en ambos idiomas

hero_title:
  en: "221% Revenue Increase Driven Purely by UX Intervention (Q1)."
  es: "221% de aumento en ventas impulsado exclusivamente por intervención UX (Q1)."

quick_scan:
  - label:
